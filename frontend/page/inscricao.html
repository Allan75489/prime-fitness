<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Prime Fitness</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="inscricao">

        <div class="inscricao-container">

            <h1>Finalize sua Inscrição</h1>

            <p>
                Preencha seus dados abaixo para concluir sua inscrição na Prime Fitness
                e começar sua jornada rumo a uma vida mais saudável.
            </p>

            <form class="form-inscricao">

                <label>Nome completo</label>
                <input type="text" placeholder="Digite seu nome" required>

                <label>Email</label>
                <input type="email" placeholder="Digite seu email" required>

                <label>Telefone</label>
                <input type="tel" placeholder="Digite seu telefone" required>

                <label>Plano escolhido</label>
                <select required>
                    <option value="">Selecione seu plano</option>
                    <option>Básico</option>
                    <option>Plus</option>
                    <option>Premium</option>
                    <option>Anual</option>
                </select>

                <label>Forma de pagamento</label>
                <select required>
                    <option value="">Escolha a forma de pagamento</option>
                    <option>Pix</option>
                    <option>Cartão de Crédito</option>
                    <option>Cartão de Débito</option>
                </select>

                <button type="submit" class="btn-finalizar">
                    Finalizar inscrição
                </button>

            </form>

            <a href="planos.html" class="voltar">← Voltar para os planos</a>

        </div>

    </section>

</body>

</html>
